AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Code Review Agent — Stage 3 sandbox execution infrastructure

Resources:

  # ── IAM Role for CodeBuild ──────────────────────────────────────────────────
  SandboxCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: code-review-sandbox-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SandboxPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Write logs to CloudWatch
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/code-review/sandbox*'

  # ── CloudWatch Log Group ─────────────────────────────────────────────────────
  SandboxLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /code-review/sandbox
      RetentionInDays: 7  # Keep build logs for 1 week — no need for longer

  # ── CodeBuild Project ────────────────────────────────────────────────────────
  SandboxProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: code-review-sandbox
      Description: Sandboxed test and lint execution for the code review agent
      ServiceRole: !GetAtt SandboxCodeBuildRole.Arn

      # No artifacts — we read output directly from CloudWatch Logs
      Artifacts:
        Type: NO_ARTIFACTS

      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL  # 3 GB RAM, 2 vCPU — plenty for tests
        Image: aws/codebuild/standard:7.0   # Python 3.11 available
        EnvironmentVariables:
          # Defaults — overridden per-build via environmentVariablesOverride
          - Name: TOOL
            Value: pytest
          - Name: REPO_URL
            Value: ''
          - Name: HEAD_BRANCH
            Value: main
          - Name: HEAD_SHA
            Value: ''
          - Name: TARGET_PATH
            Value: ''

      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                python: "3.11"
              commands:
                # Install uv for fast dependency installation
                - pip install uv --quiet 2>/dev/null || true

            pre_build:
              commands:
                # Clone the PR branch specifically so the head SHA is present in the
                # shallow history. --depth=1 on the default branch would miss PR branch commits.
                - git clone --depth=1 --branch "$HEAD_BRANCH" "$REPO_URL" /tmp/repo
                - git -C /tmp/repo checkout "$HEAD_SHA"
                # Install dependencies: try uv first, fall back to pip
                - |
                  cd /tmp/repo
                  if [ -f pyproject.toml ] && command -v uv >/dev/null 2>&1; then
                    uv sync --dev --quiet 2>/dev/null || true
                    # Make sure pytest and ruff are always available
                    uv pip install pytest ruff --quiet 2>/dev/null || true
                  elif [ -f requirements.txt ]; then
                    pip install -r requirements.txt --quiet 2>/dev/null || true
                    pip install pytest ruff --quiet
                  else
                    pip install pytest ruff --quiet
                  fi

            build:
              commands:
                - |
                  cd /tmp/repo
                  if [ "$TOOL" = "pytest" ]; then
                    TARGET="${TARGET_PATH:-.}"
                    python -m pytest "$TARGET" --tb=short -q --no-header 2>&1 || true
                  elif [ "$TOOL" = "ruff" ]; then
                    TARGET="${TARGET_PATH:-.}"
                    ruff check "$TARGET" 2>&1 || true
                  else
                    echo "ERROR: Unknown TOOL='$TOOL'. Expected 'pytest' or 'ruff'."
                    exit 1
                  fi

      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /code-review/sandbox
          # StreamName omitted — CodeBuild auto-generates one per build

      # Builds should complete well within 10 minutes
      TimeoutInMinutes: 10

Outputs:
  SandboxProjectName:
    Description: CodeBuild project name to set in CODEBUILD_PROJECT env var
    Value: !Ref SandboxProject

  SandboxLogGroup:
    Description: CloudWatch Log Group where build output is stored
    Value: !Ref SandboxLogGroup
