AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Code Review Agent

Globals:
  Function:
    Runtime: python3.11
    Timeout: 900        # 15 minutes — max Lambda timeout, agent loop can take 2-3 min
    MemorySize: 512
    Environment:
      Variables:
        AWS_ACCOUNT_ID: !Ref AWS::AccountId
        SECRETS_NAME: code-review-agent/secrets
        CODEBUILD_PROJECT: code-review-sandbox
        CODEBUILD_LOG_GROUP: /code-review/sandbox
        DYNAMODB_TABLE: code-review-history

Resources:

  # Secrets Manager
  AgentSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: code-review-agent/secrets
      Description: Runtime credentials for the code review agent
      SecretString: |
        {
          "anthropic_api_key": "REPLACE_ME",
          "github_token": "REPLACE_ME",
          "webhook_secret": "REPLACE_ME"
        }

  # IAM role for Lambda
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: code-review-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read secrets
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref AgentSecrets
              # Trigger CodeBuild and read results
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt SandboxProject.Arn
              # Read CodeBuild logs from CloudWatch
              - Effect: Allow
                Action: logs:GetLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/code-review/sandbox:*'
              # Write review records to DynamoDB
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt ReviewHistoryTable.Arn

  # Lambda function
  ReviewFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: code-review-agent
      CodeUri: ../src/
      Handler: code_review_agent.handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /webhook
            Method: POST

  # API Gateway HTTP API
  WebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  # IAM role for CodeBuild
  SandboxCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: code-review-sandbox-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SandboxPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/code-review/sandbox*'

  # CloudWatch log group for CodeBuild output
  SandboxLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /code-review/sandbox
      RetentionInDays: 7

  # CodeBuild project
  SandboxProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: code-review-sandbox
      Description: Sandboxed test and lint execution for the code review agent
      ServiceRole: !GetAtt SandboxCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: TOOL
            Value: pytest
          - Name: REPO_URL
            Value: ''
          - Name: HEAD_BRANCH
            Value: main
          - Name: HEAD_SHA
            Value: ''
          - Name: TARGET_PATH
            Value: ''
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                python: "3.11"
              commands:
                - pip install uv --quiet 2>/dev/null || true
            pre_build:
              commands:
                - git clone --depth=1 --branch "$HEAD_BRANCH" "$REPO_URL" /tmp/repo
                - git -C /tmp/repo checkout "$HEAD_SHA"
                - |
                  cd /tmp/repo
                  if [ -f pyproject.toml ] && command -v uv >/dev/null 2>&1; then
                    uv sync --dev --quiet 2>/dev/null || true
                    uv pip install pytest ruff --quiet 2>/dev/null || true
                  elif [ -f requirements.txt ]; then
                    pip install -r requirements.txt --quiet 2>/dev/null || true
                    pip install pytest ruff --quiet
                  else
                    pip install pytest ruff --quiet
                  fi
            build:
              commands:
                - |
                  cd /tmp/repo
                  if [ "$TOOL" = "pytest" ]; then
                    TARGET="${TARGET_PATH:-.}"
                    python -m pytest "$TARGET" --tb=short -q --no-header 2>&1 || true
                  elif [ "$TOOL" = "ruff" ]; then
                    TARGET="${TARGET_PATH:-.}"
                    ruff check "$TARGET" 2>&1 || true
                  else
                    echo "ERROR: Unknown TOOL='$TOOL'. Expected 'pytest' or 'ruff'."
                    exit 1
                  fi
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /code-review/sandbox
      TimeoutInMinutes: 10

  # DynamoDB table for review history
  ReviewHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: code-review-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pr_id
          AttributeType: S
        - AttributeName: reviewed_at
          AttributeType: S
      KeySchema:
        - AttributeName: pr_id
          KeyType: HASH
        - AttributeName: reviewed_at
          KeyType: RANGE

Outputs:
  WebhookUrl:
    Description: Paste this URL into your GitHub webhook settings
    Value: !Sub 'https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'

  ReviewFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ReviewFunction.Arn

  SandboxProjectName:
    Description: CodeBuild project name
    Value: !Ref SandboxProject
